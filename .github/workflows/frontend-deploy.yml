name: Frontend CI/CD to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "documind-frontend/**"
      - ".github/workflows/frontend-deploy.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: documind-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Trigger Vercel Deploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"